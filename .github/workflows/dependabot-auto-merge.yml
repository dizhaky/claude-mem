# Copy to repos/<name>/.github/workflows/dependabot-auto-merge.yml
# Auto-merge safe Dependabot PRs (github-actions bumps only).
# Requires: branch protection allows auto-merge OR admin bypass.
name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge github-actions bumps
        if: steps.meta.outputs.package-ecosystem == 'github-actions' && (steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor')
        run: |
          pkg="${{ steps.meta.outputs.dependency-names }}"
          if echo "$pkg" | grep -qiE 'actions/|docker/|pnpm/action|hashicorp/|astral-sh/'; then
            gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
          else
            echo "Skipping auto-merge for: $pkg"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
